<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARTIST FORCE MAP — COACHELLA 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #111111;
      overflow: hidden;
      font-family: 'IBM Plex Mono', monospace;
      color: #aaaaaa;
    }

    #graph {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* ── Controls panel ─────────────────────────────── */
    #controls {
      position: fixed;
      bottom: 24px;
      left: 24px;
      background: rgba(14, 14, 14, 0.90);
      border: 1px solid rgba(255, 255, 255, 0.07);
      padding: 18px 20px;
      min-width: 236px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      user-select: none;
      z-index: 50;
      transition: padding 0.25s ease, min-width 0.25s ease;
    }

    #menuHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    #menuToggle {
      background: none;
      border: none;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      line-height: 1;
      padding: 0 0 0 12px;
    }
    #menuToggle:hover { color: rgba(255,255,255,0.7); }

    #controls.minimized {
      padding: 10px 14px;
      min-width: 0;
    }
    #controls.minimized > *:not(#menuHeader) {
      display: none !important;
    }
    #controls.minimized #menuHeader {
      margin-bottom: 0;
    }

    .ctrl-row {
      margin-bottom: 15px;
    }

    .ctrl-row:last-child {
      margin-bottom: 0;
    }

    .ctrl-label {
      display: block;
      font-size: 9px;
      letter-spacing: 0.14em;
      color: rgba(255, 255, 255, 0.28);
      margin-bottom: 7px;
    }

    /* ── Auth section ─── */
    .auth-row {
      display: flex;
      gap: 10px;
    }

    .auth-col {
      flex: 1;
      min-width: 0;
    }

    .auth-btn {
      width: 100%;
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: rgba(255, 255, 255, 0.72);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      padding: 7px 6px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }

    .auth-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.38);
      color: rgba(255, 255, 255, 0.9);
    }

    .auth-user {
      font-size: 9px;
      letter-spacing: 0.06em;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .auth-disconnect {
      width: 100%;
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.10);
      color: rgba(255, 255, 255, 0.35);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.10em;
      padding: 5px 4px;
      cursor: pointer;
      transition: border-color 0.1s, color 0.1s;
    }

    .auth-disconnect:hover {
      border-color: rgba(255, 255, 255, 0.28);
      color: rgba(255, 255, 255, 0.65);
    }

    .lastfm-row {
      display: flex;
      gap: 4px;
    }

    .lastfm-row input[type="text"] {
      flex: 1;
      min-width: 0;
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: rgba(255, 255, 255, 0.72);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.06em;
      padding: 6px 6px;
      outline: none;
    }

    .lastfm-row input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.22);
    }

    .lastfm-row input[type="text"]:focus {
      border-color: rgba(255, 255, 255, 0.38);
    }

    .lastfm-go {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: rgba(255, 255, 255, 0.72);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.10em;
      padding: 6px 7px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }

    .lastfm-go:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.38);
      color: rgba(255, 255, 255, 0.9);
    }

    .auth-error {
      font-size: 8px;
      letter-spacing: 0.08em;
      color: rgba(255, 100, 100, 0.75);
      margin-top: 5px;
    }

    /* ── Day filter buttons ─── */
    .day-group {
      display: flex;
      gap: 4px;
    }

    .day-btn {
      flex: 1;
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.3);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      padding: 5px 0;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
    }

    .day-btn:hover {
      border-color: rgba(255, 255, 255, 0.3);
      color: rgba(255, 255, 255, 0.6);
    }

    .day-btn.active {
      background: rgba(255, 255, 255, 0.09);
      border-color: rgba(255, 255, 255, 0.38);
      color: rgba(255, 255, 255, 0.88);
    }

    /* ── Sliders ─── */
    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 7px;
    }

    .slider-header .ctrl-label {
      margin-bottom: 0;
    }

    .slider-value {
      font-size: 9px;
      letter-spacing: 0.06em;
      color: rgba(255, 255, 255, 0.45);
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
      border-radius: 1px;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      transition: background 0.1s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: rgba(255, 255, 255, 0.88);
    }

    input[type="range"]::-moz-range-thumb {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      border: none;
    }

    /* ── Checkboxes ─── */
    .check-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: rgba(255, 255, 255, 0.38);
      cursor: pointer;
      margin-bottom: 7px;
      transition: color 0.1s;
    }

    .check-label:last-child {
      margin-bottom: 0;
    }

    .check-label:hover {
      color: rgba(255, 255, 255, 0.65);
    }

    .check-label input[type="checkbox"] {
      accent-color: rgba(255, 255, 255, 0.75);
      width: 11px;
      height: 11px;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* ── Separator ─── */
    .ctrl-sep {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      margin: 15px 0;
    }

    /* ── Artist panel ─── */
    .artist-panel {
      position: fixed;
      right: 0;
      top: 0;
      height: 100vh;
      width: 320px;
      background: #1a1a1a;
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 100;
      overflow-y: auto;
      font-family: 'IBM Plex Mono', monospace;
    }

    .artist-panel.open {
      transform: translateX(0);
    }

    #panelClose {
      position: absolute;
      top: 14px;
      right: 14px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
      cursor: pointer;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: transparent;
      border: 2px solid rgba(255,255,255,0.08);
      border-top-color: rgba(255,255,255,0.45);
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Export button ─── */
    #exportBtn {
      width: 100%;
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: rgba(255, 255, 255, 0.4);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      padding: 7px 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #exportBtn.active {
      border-color: #4caf50;
      color: #4caf50;
    }

    /* ── Track submenu ─── */
    .track-submenu {
      background: rgba(255, 255, 255, 0.03);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding: 10px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.2s ease, opacity 0.2s ease;
    }

    .sub-svc-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      color: rgba(255, 255, 255, 0.55);
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .sub-svc-btn:hover {
      border-color: rgba(255, 255, 255, 0.35);
      color: rgba(255, 255, 255, 0.9);
    }

    .add-playlist-btn {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      padding: 5px 10px;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: border-color 0.15s;
    }

    .add-playlist-btn:hover {
      border-color: rgba(255, 255, 255, 0.3);
    }

    .add-btn-icon {
      width: 15px;
      height: 15px;
      background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #c77dff);
      -webkit-mask: url(/static/music-player-add-playlist-queue-square-black-icon.svg) center / contain no-repeat;
      mask: url(/static/music-player-add-playlist-queue-square-black-icon.svg) center / contain no-repeat;
      flex-shrink: 0;
    }

    .rainbow-text {
      background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #c77dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 10px;
      letter-spacing: 0.08em;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* ── Discovery toggle ─── */
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 32px;
      height: 18px;
      flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.1);
      border-radius: 18px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      left: 3px;
      top: 3px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider {
      background: rgba(76,175,80,0.4);
    }
    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(14px);
      background: #4caf50;
    }

    /* ── Export panel ─── */
    #exportPanel {
      position: fixed;
      bottom: 0;
      left: 24px;
      min-width: 280px;
      max-height: 80vh;
      overflow-y: auto;
      background: #1a1a1a;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px 8px 0 0;
      z-index: 200;
      font-family: 'IBM Plex Mono', monospace;
      transform: translateY(100%);
      transition: transform 0.25s ease;
    }

    #exportPanel.open {
      transform: translateY(0);
    }

    .ep-svc-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 4px;
      color: rgba(255, 255, 255, 0.55);
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .ep-svc-btn:hover {
      border-color: rgba(255, 255, 255, 0.35);
      color: rgba(255, 255, 255, 0.9);
    }

    /* ── Mobile bottom drawer ─── */
    #artistDrawer {
      display: none;
    }

    @media (max-width: 767px) {
      #graph {
        height: 55vh;
      }

      #artistDrawer {
        display: block;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(10, 10, 10, 0.97);
        z-index: 200;
        overflow: hidden;
        transition: transform 0.35s ease, height 0.35s ease;
      }

      #artistDrawer.drawer-hidden {
        transform: translateY(100%);
        height: 45vh;
      }

      #artistDrawer.drawer-collapsed {
        transform: translateY(0);
        height: 45vh;
        overflow-y: auto;
      }

      #artistDrawer.drawer-expanded {
        transform: translateY(0);
        height: 85vh;
        overflow-y: auto;
      }

      #artistDrawer.drawer-peek {
        transform: translateY(0);
        height: 72px;
        overflow: hidden;
      }

      /* ── Drawer hero ── */
      #drawerHero {
        position: relative;
        width: 100%;
        height: 160px;
        background-size: cover;
        background-position: center top;
        background-color: #1a1a1a;
        flex-shrink: 0;
      }

      #drawerHero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, rgba(10,10,10,0) 0%, rgba(10,10,10,0.7) 60%, rgba(10,10,10,0.97) 100%);
      }

      #drawerHeroName {
        position: absolute;
        bottom: 10px;
        left: 16px;
        font-size: 18px;
        font-weight: bold;
        color: white;
        font-family: 'IBM Plex Mono', monospace;
        z-index: 1;
      }

      /* ── Drawer meta ── */
      #drawerMeta {
        padding: 8px 16px 12px;
        flex-shrink: 0;
      }

      #drawerMetaLine {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.45);
        letter-spacing: 0.1em;
        font-family: 'IBM Plex Mono', monospace;
        margin-bottom: 8px;
      }

      #drawerMetaTags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      .drawer-tag {
        display: inline-block;
        background: rgba(255, 255, 255, 0.07);
        border-radius: 3px;
        padding: 2px 6px;
        font-size: 9px;
        color: rgba(255, 255, 255, 0.4);
        font-family: 'IBM Plex Mono', monospace;
      }

      /* ── Drawer tracks ── */
      #drawerTracks {
        flex-shrink: 0;
      }

      .drawer-track-row {
        display: flex;
        align-items: center;
        padding: 12px 16px;
        gap: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        cursor: pointer;
      }

      .drawer-track-art {
        width: 44px;
        height: 44px;
        object-fit: cover;
        border-radius: 4px;
        flex-shrink: 0;
      }

      .drawer-track-info {
        flex: 1;
        min-width: 0;
      }

      .drawer-track-name {
        font-size: 12px;
        color: white;
        font-family: 'IBM Plex Mono', monospace;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .drawer-track-artist {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.45);
        font-family: 'IBM Plex Mono', monospace;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-top: 2px;
      }

      .drawer-play-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1.5px solid rgba(255, 255, 255, 0.3);
        background: none;
        color: white;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition: border-color 0.15s, color 0.15s;
      }

      .drawer-play-btn.playing {
        border-color: #1db954;
        color: #1db954;
      }

      .drawer-track-submenu {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.25s ease;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 16px 0 72px;
      }

      .drawer-track-submenu.open {
        max-height: 80px;
        padding: 8px 16px 12px 72px;
      }

      /* ── Drawer bio ── */
      #drawerBio {
        padding: 16px;
        font-size: 10px;
        line-height: 1.7;
        color: rgba(255, 255, 255, 0.5);
        font-family: 'IBM Plex Mono', monospace;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }
    }
  </style>
</head>
<body>

  <svg id="graph"></svg>

  <div id="artistPanel" class="artist-panel">
    <button id="panelClose">✕</button>
    <div id="panelContent"></div>
  </div>

  <div id="controls">
    <div id="menuHeader">
      <span style="font-size:9px;letter-spacing:0.12em;color:rgba(255,255,255,0.25)">CONTROLS</span>
      <button id="menuToggle" title="Minimize">−</button>
    </div>
    <!-- Auth section: Spotify + Last.fm -->
    <div class="ctrl-row">
      <div class="auth-row">
        <!-- Spotify column -->
        <div class="auth-col" id="spotifyCol">
          <span class="ctrl-label">SPOTIFY</span>
          <div id="spotifyConnected" style="display:none">
            <div id="spotifyUserLabel" class="auth-user"></div>
            <button id="spotifyDisconnect" class="auth-disconnect">DISCONNECT</button>
          </div>
          <button id="spotifyBtn" class="auth-btn">CONNECT ▶</button>
        </div>
        <!-- Last.fm column -->
        <div class="auth-col" id="lastfmCol">
          <span class="ctrl-label">LAST.FM</span>
          <div id="lastfmConnected" style="display:none">
            <div id="lastfmUserLabel" class="auth-user"></div>
            <button id="lastfmDisconnect" class="auth-disconnect">DISCONNECT</button>
          </div>
          <div id="lastfmInput">
            <div class="lastfm-row">
              <input type="text" id="lastfmUsername" placeholder="username" />
              <button id="lastfmGo" class="lastfm-go">GO</button>
            </div>
            <div id="lastfmError" class="auth-error" style="display:none">User not found</div>
          </div>
        </div>
      </div>
    </div>

    <div class="ctrl-row" id="exportRow" style="display:none">
      <button id="exportBtn">MY PLAYLIST (0)</button>
    </div>

    <hr class="ctrl-sep" />

    <!-- Day filter -->
    <div class="ctrl-row">
      <span class="ctrl-label">DAY</span>
      <div class="day-group">
        <button class="day-btn active" data-day="ALL">ALL</button>
        <button class="day-btn" data-day="FRI">FRI</button>
        <button class="day-btn" data-day="SAT">SAT</button>
        <button class="day-btn" data-day="SUN">SUN</button>
      </div>
    </div>

    <!-- Edge threshold (re-fetches on change) -->
    <div class="ctrl-row">
      <div class="slider-header">
        <span class="ctrl-label">EDGE THRESHOLD</span>
        <span class="slider-value" id="thresholdValue">0.20</span>

      </div>
      <input type="range" id="thresholdSlider" min="0" max="4" step="1" value="2" />
    </div>

    <!-- Node size (live) -->
    <div class="ctrl-row">
      <div class="slider-header">
        <span class="ctrl-label">NODE SIZE</span>
        <span class="slider-value" id="nodeSizeValue">1.0</span>
      </div>
      <input type="range" id="nodeSizeSlider" min="0.5" max="3" step="0.05" value="1" />
    </div>

    <hr class="ctrl-sep" />

    <!-- Edge type toggles (live) -->
    <div class="ctrl-row">
      <label class="check-label">
        <input type="checkbox" id="similarityCheck" checked />
        SIMILARITY EDGES
      </label>
      <label class="check-label">
        <input type="checkbox" id="genreCheck" checked />
        GENRE EDGES
      </label>
    </div>

    <hr class="ctrl-sep" />

    <div class="ctrl-row">
      <label class="ctrl-label">DISCOVERY MODE</label>
      <label class="toggle-switch">
        <input type="checkbox" id="discoveryToggle" />
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div id="exportPanel" style="display:none"></div>

  <div id="artistDrawer" class="drawer-hidden">
    <div id="drawerHero">
      <div id="drawerHeroName"></div>
    </div>
    <div id="drawerMeta">
      <div id="drawerMetaLine"></div>
      <div id="drawerMetaTags"></div>
    </div>
    <div id="drawerTracks"></div>
    <div id="drawerBio" style="display:none"></div>
  </div>

  <script>
